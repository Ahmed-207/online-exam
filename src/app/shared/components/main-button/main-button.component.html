<button class="w-full flex items-center justify-center gap-2" [class]="{
    'btn-main' : btnClass() === '1',
    'btn-secondary' : btnClass() === '2',
    'btn-destructive' : btnClass() === '3',
    'btn-outline' : btnClass() === '4',
}">@if(isLeftIcon()){<i [class]="leftIcon()"></i>}{{content()}}@if(isRightIcon()){<i
        [class]="rightIcon()"></i>}</button>
