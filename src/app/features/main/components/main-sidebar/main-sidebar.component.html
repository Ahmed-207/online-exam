@if(isSmallScreen()){
<div class="dock-window">
    <p-dock [model]="items" [position]="'bottom'">
        <ng-template #item let-item>
            <a [routerLink]="item.routerLink"
                class="flex items-center justify-center w-full p-3 bg-white text-blue-600 rounded border border-blue-500">
                <li class="icon-container text-xl" [class]="item.iconClass"></li>
            </a>
        </ng-template>
    </p-dock>
</div>
}@else {
<section class="p-10 h-full flex flex-col justify-stretch">
    <div class="logo-container grid grid-cols-3 mb-3">
        <div class="image-container col-span-2 mb-2">
            <img src="./assets/images/elevate-logo.png" class="logo block size-full" alt="">
        </div>
        <div class="main-brand flex items-center col-span-2 text-blue-500">
            <lucide-angular [img]="folderCode" [size]="30" class="my-icon me-2 "></lucide-angular>
            <span>Exam App</span>
        </div>
    </div>
    <div class="flex flex-col justify-between grow">
        <ul class="main-buttons">
            <li class="cursor-pointer"><a class="p-4 flex text-gray-500" [routerLink]="'diplomas'"
                    [routerLinkActiveOptions]="{ exact: true }"
                    [routerLinkActive]="'bg-blue-100 outline outline-blue-500 text-blue-500'"><lucide-angular
                        [img]="graduationCap"></lucide-angular><span class="ms-2">Diplomas</span></a>
            </li>
            <li class="cursor-pointer"><a class="p-4 flex text-gray-500" [routerLink]="'user-account'"
                    [routerLinkActiveOptions]="{ exact: true }"
                    [routerLinkActive]="'bg-blue-100 outline outline-blue-500 text-blue-500'"><lucide-angular
                        [img]="userRound"></lucide-angular><span class="ms-2">Account Setting</span></a></li>
        </ul>
        <div class="user-card">
            <app-user-card></app-user-card>
        </div>
    </div>
</section>
}
