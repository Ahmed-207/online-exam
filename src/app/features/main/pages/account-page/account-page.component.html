<div class="grid grid-cols-12 gap-4 h-full">
    @if(isSmallScreen()){
    <div class="card col-span-12">
        <p-toolbar>
            <ng-template #center>
                <p-button icon="pi pi-user" label="profile" text severity="secondary" routerLink="/home/account"
                    routerLinkActive="bg-blue-50" [routerLinkActiveOptions]="{exact: true}" />
                <p-button icon="pi pi-key" label="password" text severity="secondary"
                    routerLink="/home/account/change-password" routerLinkActive="bg-blue-50" />
                <p-button icon="pi pi-sign-out" text severity="secondary" (click)="signOut()" />
            </ng-template>
        </p-toolbar>
    </div>
    }@else {
    <div class="account-sidebar col-span-4 bg-white p-5 flex flex-col justify-between grow">
        <ul class="main-buttons">
            <li class="cursor-pointer"><a class="p-4 flex text-gray-500 font-light " [routerLink]="'/home/account'"
                    [routerLinkActiveOptions]="{ exact: true }"
                    [routerLinkActive]="'bg-blue-100 text-blue-500'"><lucide-angular
                        [img]="circleUserRound"></lucide-angular><span class="ms-2">Profile</span></a>
            </li>
            <li class="cursor-pointer"><a class="p-4 flex text-gray-500 font-light " [routerLink]="'change-password'"
                    [routerLinkActiveOptions]="{ exact: true }"
                    [routerLinkActive]="'bg-blue-100 text-blue-500'"><lucide-angular [img]="lock"></lucide-angular><span
                        class="ms-2">Change Password</span></a></li>
        </ul>
        <div class="log-out-button cursor-pointer">
            <a class="p-4 flex text-red-500  font-light bg-red-50" (click)="signOut()"><lucide-angular
                    [img]="logOut"></lucide-angular><span class="ms-2">Logout</span></a>
        </div>
    </div>
    }
    @if(!changePasswordFlag()){
    <div class="col-span-12 md:col-span-8 bg-white p-5 flex items-start justify-center">
        <form class="profile-form grid grid-cols-12 gap-x-3 gap-y-4 w-full shrink-0" [formGroup]="profileForm"
            (ngSubmit)="changeProfileData()">
            <div class="card flex justify-center col-span-12 md:col-span-6">
                <div class="flex w-full flex-col gap-1">
                    <label for="firstName">First Name</label>
                    <input class="w-full" pInputText id="firstName" formControlName="firstName"
                        aria-describedby="firstname" />
                </div>
            </div>
            <div class="card flex justify-center col-span-12 md:col-span-6">
                <div class="flex w-full flex-col gap-1">
                    <label for="lastName">Last Name</label>
                    <input class="w-full" pInputText id="lastName" formControlName="lastName"
                        aria-describedby="lastname" />
                </div>
            </div>
            <div class="card flex justify-center col-span-12">
                <div class="flex flex-col gap-1 w-full">
                    <label for="userName">Username</label>
                    <input class="w-full" pInputText id="userName" formControlName="username"
                        aria-describedby="username" />
                </div>
            </div>
            <div class="card flex justify-center col-span-12">
                <div class="flex flex-col gap-1 w-full">
                    <div class="flex items-center justify-between">
                        <label for="email">Email</label>
                        <span class="text-blue-600 font-light flex items-center justify-evenly cursor-pointer"
                            (click)="showEmailModal()"><lucide-angular [img]="pencil" [size]="20"></lucide-angular><span
                                class="ms-2">change</span></span>
                    </div>
                    <input class="w-full" pInputText id="email" formControlName="email" aria-describedby="email" />
                </div>
            </div>
            <div class="card flex justify-center col-span-12">
                <div class="flex w-full flex-col gap-1">
                    <label class="block" for="phoneNumber">Phone</label>
                    <input type="text" pInputText id="phoneNumber" pKeyFilter="int" class="w-full"
                        formControlName="phone" maxlength="11" />
                </div>
            </div>
            <div class="col-span-12 buttons-container grid grid-cols-12 gap-3">
                <div class="col-span-12 md:col-span-6">
                    <app-main-button [btnClass]="'5'" [buttonType]="'button'" [content]="'Delete Account'"
                        (buttonClick)="showDeleteModal()"></app-main-button>
                </div>
                <div class="col-span-12 md:col-span-6">
                    <app-main-button [btnClass]="'1'" [content]="'Save Changes'" [disabledFlag]="!submitButtonFlag()"
                        [buttonType]="'submit'"></app-main-button>
                </div>
            </div>
        </form>
    </div>
    @if(modalFlag.emailModalFlag()){
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-[2px]">
        <div class="relative scale-[0.7] md:scale-100 w-full max-w-lg">
            <app-change-email-flow></app-change-email-flow>
        </div>
    </div>
    }
    @if(modalFlag.deleteAccountFlag()){
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-[2px]">
        <div class="relative scale-[0.7] md:scale-100 w-full max-w-lg">
            <app-delete-account-modal></app-delete-account-modal>
        </div>
    </div>
    }
    }@else {
    <div class="col-span-12 md:col-span-8 bg-white p-5">
        <router-outlet></router-outlet>
    </div>
    }
</div>
