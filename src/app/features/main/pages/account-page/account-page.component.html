<div class="grid grid-cols-12 gap-4 items-stretch">
    <div class="account-sidebar col-span-4 bg-white p-5 flex flex-col justify-between grow">
        <ul class="main-buttons">
            <li class="cursor-pointer"><a class="p-4 flex text-gray-500 font-light " [routerLink]="'/home/account'"
                    [routerLinkActiveOptions]="{ exact: true }"
                    [routerLinkActive]="'bg-blue-100 text-blue-500'"><lucide-angular
                        [img]="circleUserRound"></lucide-angular><span class="ms-2">Profile</span></a>
            </li>
            <li class="cursor-pointer"><a class="p-4 flex text-gray-500 font-light " [routerLink]="'change-password'"
                    [routerLinkActiveOptions]="{ exact: true }"
                    [routerLinkActive]="'bg-blue-100 text-blue-500'"><lucide-angular [img]="lock"></lucide-angular><span
                        class="ms-2">Change Password</span></a></li>
        </ul>
        <div class="log-out-button cursor-pointer">
            <a class="p-4 flex text-red-500  font-light bg-red-50" (click)="signOut()"><lucide-angular [img]="logOut"></lucide-angular><span
                    class="ms-2">Logout</span></a>
        </div>
    </div>
    <form class="profile-form col-span-8 bg-white p-5 grid grid-cols-12 gap-3" [formGroup]="profileForm"
        (ngSubmit)="changeProfileData()">
        <div class="card flex justify-center col-span-6 mb-3">
            <div class="flex w-full flex-col gap-2">
                <label for="firstName">First Name</label>
                <input class="w-full" pInputText id="firstName" formControlName="firstName"
                    aria-describedby="firstname" />
            </div>
        </div>
        <div class="card flex justify-center col-span-6 mb-3">
            <div class="flex w-full flex-col gap-2">
                <label for="lastName">Last Name</label>
                <input class="w-full" pInputText id="lastName" formControlName="lastName" aria-describedby="lastname" />
            </div>
        </div>
        <div class="card flex justify-center col-span-12 mb-3">
            <div class="flex flex-col gap-2 w-full">
                <label for="userName">Username</label>
                <input class="w-full" pInputText id="userName" formControlName="username" aria-describedby="username"/>
            </div>
        </div>
        <div class="card flex justify-center col-span-12 mb-3">
            <div class="flex flex-col gap-2 w-full">
                <div class="flex items-center justify-between">
                    <label for="email">Email</label>
                    <span class="text-blue-600 font-light flex items-center justify-evenly cursor-pointer"
                        (click)="showModal()"><lucide-angular [img]="pencil" [size]="20"></lucide-angular><span
                            class="ms-2">change</span></span>
                </div>
                <input class="w-full" pInputText id="email" formControlName="email" aria-describedby="email" />
            </div>
        </div>
        <div class="card flex justify-center col-span-12 mb-3">
            <div class="flex w-full flex-col gap-2">
                <label class="block" for="phoneNumber">Phone</label>
                <input type="text" pInputText id="phoneNumber" pKeyFilter="int" class="w-full" formControlName="phone"
                    maxlength="11" />
            </div>
        </div>
        <div class="col-span-12 buttons-container grid grid-cols-12 gap-3">
            <div class="col-span-6">
                <app-main-button [btnClass]="'5'" [content]="'Delete Account'"></app-main-button>
            </div>
            <div class="col-span-6">
                <app-main-button [btnClass]="'1'" [content]="'Save Changes'" [disabledFlag]="!submitButtonFlag()"
                    [buttonType]="'submit'"></app-main-button>
            </div>
        </div>
    </form>
</div>
@if(modalFlag.emailModalFlag()){
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-[2px]">
    <div class="relative w-full max-w-lg"> 
        <app-change-email-flow></app-change-email-flow>
    </div>
</div>
}
