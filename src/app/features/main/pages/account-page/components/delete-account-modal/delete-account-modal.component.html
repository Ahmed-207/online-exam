<div class="flex flex-col items-center justify-evenly p-5 bg-white w-full max-w-125 min-h-112.5 relative">
    <button class="absolute top-3 right-3 text-gray-400 hover:text-gray-600" (click)="closeModal()">
        <i class="pi pi-times"></i>
    </button>
    <div class="icon-container rounded-full bg-red-50 p-3">
        <div class="icon w-full rounded-full bg-red-100 flex justify-center items-center p-3">
            <lucide-angular [img]="triangleAlert" [size]="40" [color]="'red'"></lucide-angular>
        </div>
    </div>
    <div class="text-content flex flex-col gap-2 items-center justify-center">
        <span class="text-red-600 font-medium text-[16px]">Are you sure you want to delete your account?</span>
        <span class="text-gray-600 font-light text-[14px]">This action is permanent and cannot be undone.</span>
    </div>
    <div class="buttons-container flex items-center justify-center gap-2 translate-y-5 w-full">
        <div class="w-[40%]">
            <app-main-button [btnClass]="'6'" [content]="'Cancel'" (buttonClick)="closeModal()"></app-main-button>
        </div>
        <div class="w-[40%]">
            <app-main-button [btnClass]="'3'" [content]="'Yes, delete'" (buttonClick)="deleteAccountForEver()"></app-main-button>
        </div>
    </div>
</div>
