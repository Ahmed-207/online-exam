<div class="flex flex-col items-start justify-center gap-2 p-7 bg-white">
    <h2 class="font-bold text-[30px] pb-3">Change Email</h2>
    <h3 class="font-bold text-[20px] pb-4 text-blue-600">Verify OTP</h3>
    <p class="text-gray-600 w-full inline-block">Please enter the 6-digits code we have sent to: <span
            class="text-black">{{storedEmail()}}
            <span class="text-blue-600 cursor-pointer" (click)="resetEmail()">Edit</span></span></p>
    <form class="grid grid-cols-12 gap-4 self-center" [formGroup]="verifyForm" (ngSubmit)="submitCode()">
        <div class="card flex justify-center col-span-12 pb-3">
            <p-inputotp [length]="6" formControlName="code" />
        </div>
        @if(counterFlag()){
        <span class="text-center text-gray-600 pb-3 col-span-12 inline-block">You can request another code in:
            {{counter()}}s</span>
        }@else {
        <span class="text-center text-gray-600 pb-3 col-span-12 inline-block">Didn’t receive the code? <span
                (click)="resendCode()" class="text-blue-600 cursor-pointer">Resend</span></span>
        }
        @if(errorFlag()){
        <div class="col-span-12">
            <app-alert-message [alertContent]="errorMsg()"></app-alert-message>
        </div>
        }
        <div class="col-span-12">
            <app-main-button [btnClass]="'1'" [content]="'verify code'" [buttonType]="'submit'"
                [isRightIcon]=" buttonFlag() ? true : undefined " [disabledFlag]="buttonFlag()"
                [rightIcon]="buttonFlag() ? 'pi pi-spin pi-spinner': undefined"></app-main-button>
        </div>
    </form>
</div>
