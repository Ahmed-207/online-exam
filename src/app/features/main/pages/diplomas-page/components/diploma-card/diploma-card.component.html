<div class="card bg-blue-500 relative shadow-2xl cursor-pointer" (click)="navigateToDiplomaExams()">
    <img [src]="diplomaCardData().image" class="block w-full h-120" alt="">
    <div class="diploma-content bg-blue-500/75 absolute bottom-2 left-2 right-2 p-3">
        <h3 class="text-white font-medium">{{diplomaCardData().title}}</h3>
        <p class="text-white/80 font-light">{{diplomaCardData().description}}</p>
    </div>
</div>
