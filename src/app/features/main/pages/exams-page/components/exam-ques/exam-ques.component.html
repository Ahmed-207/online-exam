<div class="bg-white p-4">
    <div class="header-container mb-4">
        <app-ques-header></app-ques-header>
    </div>
    <div class="exam-content">
        @if(!isExamFinished() || parentRestartFlag()){
        <app-question [restartFlagForExam]="parentRestartFlag()"
            (restartFlagForParentEmit)="parentRestartFlag()"></app-question>
        }@else {
        <app-exam-results (restartFlag)="parentRestartFlag()"></app-exam-results>
        }
    </div>
</div>
