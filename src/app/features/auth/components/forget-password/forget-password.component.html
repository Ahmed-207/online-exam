<div class="form-container grid gap-10">
    <h2 class="font-bold text-[30px] pb-3">Forgot Password</h2>
    <p class="text-gray-600">Don’t worry, we will help you recover your account.</p>
    <form class="grid md:grid-cols-12 gap-4" action="">

        <div class="card flex justify-center md:col-span-12">
            <div class="flex flex-col gap-2 w-full">
                <label for="email">E-mail</label>
                <input class="w-full" pInputText id="email" aria-describedby="email" type="email" />
            </div>
        </div>
        <div class="col-span-12 pt-6">
            <app-main-button [btnClass]="'1'" [content]="'Continue'" [isRightIcon]="true" [rightIcon]="'pi pi-arrow-right'"></app-main-button>
        </div>
    </form>
    <span class="text-center">Don't have an account ? <a class="text-blue-600" href="">create yours</a></span>
</div>
