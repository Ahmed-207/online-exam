<div class="form-container grid gap-10 md:gap-5">
    <h2 class="font-bold text-[30px] pb-4">Create Account</h2>
    <h3 class="font-bold text-[25px] pb-4 text-blue-600">Create a strong password</h3>
    <form class="grid grid-cols-12 gap-4" action="">
        <div class="card flex justify-center col-span-12">
            <div class="flex w-full flex-col gap-2">
                <label class="block" for="password">Password</label>
                <p-password id="password" [toggleMask]="true" autocomplete="off" />
            </div>
        </div>
        <div class="card flex justify-center col-span-12">
            <div class="flex w-full flex-col gap-2">
                <label class="block" for="rePass">confirm password</label>
                <p-password id="rePass" [toggleMask]="true" autocomplete="off" />
            </div>
        </div>
        <div class="col-span-12 pt-6">
            <app-main-button [btnClass]="'1'" [content]="'sign up'"></app-main-button>
        </div>
    </form>
</div>
